<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>自选股综合 Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">A股 / 港股 / 美股</p>
            <h1>自选股综合 Dashboard</h1>
          </div>
          <div class="summary" id="summary">
            <span>等待输入</span>
          </div>
        </header>

        <form class="input-panel" id="watchlist-form">
          <input type="hidden" id="symbols" name="symbols" />
          <label>自选股录入</label>
          <div class="entry-grid">
            <label>
              市场
              <select id="entry-market" name="entry-market">
                <option value="A股">A股</option>
                <option value="港股">港股</option>
                <option value="美股">美股</option>
              </select>
            </label>
            <label>
              股票代码
              <input id="entry-symbol" name="entry-symbol" placeholder="如 300620 / 00700 / AAPL" autocomplete="off" />
            </label>
            <label>
              持股成本
              <input id="entry-cost" name="entry-cost" inputmode="decimal" placeholder="成本价，可选" />
            </label>
            <label>
              持股数量
              <input id="entry-shares" name="entry-shares" inputmode="decimal" placeholder="数量，可选" />
            </label>
            <button type="submit" id="analyze-button">加入并分析</button>
          </div>
          <div class="quick-actions">
            <button type="button" data-sample="300620 300394 hk00700 AAPL TSLA">示例组合</button>
            <button type="button" id="analyze-current-button">刷新分析</button>
            <button type="button" id="clear-button">清空</button>
          </div>
          <div class="watchlist-chips" id="watchlist-chips"></div>
        </form>

        <section class="status-line" id="status-line" aria-live="polite"></section>

        <div class="dashboard-layout">
          <section class="analysis-column" aria-label="自选股分析">
            <section class="market-section market-a" data-market="A股">
              <div class="section-head">
                <h2>A股</h2>
                <span id="count-a">0</span>
              </div>
              <div class="stock-grid" id="group-a"></div>
            </section>

            <section class="market-section market-hk" data-market="港股">
              <div class="section-head">
                <h2>港股</h2>
                <span id="count-hk">0</span>
              </div>
              <div class="stock-grid" id="group-hk"></div>
            </section>

            <section class="market-section market-us" data-market="美股">
              <div class="section-head">
                <h2>美股</h2>
                <span id="count-us">0</span>
              </div>
              <div class="stock-grid" id="group-us"></div>
            </section>
          </section>

          <aside class="wealth-panel" aria-label="财富管理">
            <div class="wealth-head">
              <p class="eyebrow">Portfolio</p>
              <h2>财富管理</h2>
            </div>
            <div class="wealth-summary" id="wealth-summary">
              <div><span>总市值</span><strong>-</strong></div>
              <div><span>总成本</span><strong>-</strong></div>
              <div><span>总盈亏</span><strong>-</strong></div>
              <div><span>总体收益率</span><strong>-</strong></div>
            </div>
            <form class="holding-form" id="holding-form">
              <h3>添加持仓</h3>
              <label>
                市场
                <select id="holding-market" name="holding-market">
                  <option value="A股">A股</option>
                  <option value="港股">港股</option>
                  <option value="美股">美股</option>
                </select>
              </label>
              <label>
                股票代码
                <input id="holding-symbol" name="holding-symbol" placeholder="如 300620 / hk00700 / AAPL" autocomplete="off" />
              </label>
              <div class="holding-form-row">
                <label>
                  持股成本
                  <input id="holding-cost" name="holding-cost" inputmode="decimal" placeholder="成本价" />
                </label>
                <label>
                  持股数量
                  <input id="holding-shares" name="holding-shares" inputmode="decimal" placeholder="数量" />
                </label>
              </div>
              <button type="submit">加入财富管理</button>
            </form>
            <div class="wealth-advice" id="wealth-advice">等待输入持仓后生成财富管理建议。</div>
            <div class="wealth-list" id="wealth-list"></div>
          </aside>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
